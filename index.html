<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#020617">
    <title>MLBB Guess Hero - Survival Streak</title>
    
    <!-- CSP: Cleaned up unused domains, allowed MyInstants for the vine boom audio -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self'; 
        script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://pagead2.googlesyndication.com https://www.gstatic.com https://www.tiktok.com; 
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
        font-src https://fonts.gstatic.com; 
        img-src 'self' data: https: http: https://*.ytimg.com https://*.ggpht.com; 
        media-src 'self' https: http: data: blob: https://*.googlevideo.com https://www.myinstants.com;
        connect-src 'self' https://firestore.googleapis.com https://*.firebasedatabase.app wss://*.firebaseio.com https://identitytoolkit.googleapis.com https://api.isan.eu.org; 
        frame-src 'self' https://www.tiktok.com;
    ">
    <script src="https://elfsightcdn.com/platform.js" async></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --safe-top: env(safe-area-inset-top, 0px); --safe-bottom: env(safe-area-inset-bottom, 0px); }
        body {
            font-family: 'Rajdhani', sans-serif; color: #f8fafc; overscroll-behavior-y: none;
            user-select: none; -webkit-tap-highlight-color: transparent; height: 100dvh; 
            margin: 0; overflow: hidden; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
            background-color: #020617;
        }
        .ambient-bg { position: fixed; inset: 0; background: radial-gradient(circle at 50% 45%, #1e1b4b 0%, #020617 75%); z-index: -40; }
        @keyframes error-shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-12px); } 40%, 80% { transform: translateX(12px); } }
        .animate-error { animation: error-shake 0.4s cubic-bezier(.36,.07,.19,.97) both; border-color: #e11d48 !important; }
        @keyframes vine-boom-anim { 0% { transform: scale(3); opacity: 0; } 10% { transform: scale(1); opacity: 1; filter: brightness(2); } 100% { transform: scale(1); opacity: 1; } }
        .animate-boom { animation: vine-boom-anim 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input::placeholder { text-transform: none; letter-spacing: normal; font-weight: 500; }
    </style>
</head>
<body class="w-full relative">

    <div class="ambient-bg"></div>

    <!-- LOGIN SCREEN -->
    <div id="screen-login" class="absolute inset-0 w-full max-w-sm mx-auto px-6 flex flex-col items-center z-10 overflow-y-auto py-10 no-scrollbar gap-8">
        <div class="flex flex-col items-center justify-center relative w-full pt-6">
            <h1 class="text-[3.5rem] font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-cyan-400 to-indigo-400 leading-none text-center">GUESS<br><span class="text-3xl tracking-widest text-white">THE HERO</span></h1>
            <div class="flex gap-2 mt-4">
                <p class="text-[10px] font-black text-yellow-400 uppercase tracking-widest bg-yellow-900/20 px-3 py-1 rounded-full border border-yellow-500/30">🥇 Epic Skin</p>
                <p class="text-[10px] font-black text-purple-400 uppercase tracking-widest bg-purple-900/20 px-3 py-1 rounded-full border border-purple-500/30">🥈 SL Premium</p>
            </div>
        </div>

        <div class="w-full bg-slate-900/60 backdrop-blur-xl p-6 rounded-[2rem] border border-slate-700/50 shadow-2xl flex flex-col gap-4">
            <form id="form-login" class="w-full flex flex-col gap-5">
                <div class="flex flex-col gap-1.5 w-full">
                    <label class="text-[10px] text-indigo-300 font-black uppercase tracking-widest ml-2">MLBB ID</label>
                    <input type="number" id="login-id" inputmode="numeric" placeholder="ex: 332701234" class="w-full h-14 bg-slate-950/80 border border-slate-700/80 rounded-2xl px-5 text-xl text-center font-bold text-white focus:outline-none focus:border-indigo-400 transition-all" required>
                </div>
                <div class="flex flex-col gap-1.5 w-full">
                    <label class="text-[10px] text-indigo-300 font-black uppercase tracking-widest ml-2">Server ID</label>
                    <input type="number" id="login-zone" inputmode="numeric" placeholder="ex: 1234" class="w-full h-14 bg-slate-950/80 border border-slate-700/80 rounded-2xl px-5 text-xl text-center font-bold text-white focus:outline-none focus:border-indigo-400 transition-all" required>
                </div>
                <p id="login-msg" class="text-cyan-400 text-sm h-4 font-bold text-center"></p>
                <button type="submit" id="btn-login" class="w-full h-14 bg-gradient-to-r from-indigo-500 to-indigo-600 text-white font-black text-xl rounded-2xl shadow-lg active:scale-[0.97] transition-all uppercase tracking-widest border border-indigo-400/30">CONNECT</button>
            </form>
        </div>

        <div class="w-full flex justify-center bg-white/5 rounded-xl overflow-hidden min-h-[300px] border border-white/10">
            <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@znapurple" data-unique-id="znapurple" data-embed-type="creator" style="max-width: 100%; min-width: 288px; margin: 0;"> 
                <section> <a target="_blank" href="https://www.tiktok.com/@znapurple">@znapurple</a> </section> 
            </blockquote> 
            <script async src="https://www.tiktok.com/embed.js"></script>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="screen-game" class="absolute inset-0 w-full max-w-sm mx-auto flex flex-col z-10 hidden">
        <div class="w-full px-5 pt-6 shrink-0">
            <div class="flex justify-between items-center bg-slate-900/40 border border-slate-700/50 rounded-2xl px-5 py-3 backdrop-blur-xl">
                <div class="flex flex-col max-w-[50%]">
                    <span id="player-ign" class="text-[10px] text-cyan-400 font-black tracking-widest uppercase truncate">Player</span>
                    <div class="flex items-baseline gap-1">
                        <span class="text-[10px] text-indigo-300 font-black">BEST:</span>
                        <span id="player-best" class="font-bold text-white text-lg">0</span>
                    </div>
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-[10px] text-rose-400 font-black tracking-[0.2em] uppercase">STREAK</span>
                    <span id="player-streak" class="font-black text-3xl text-white transition-transform duration-200">0</span>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center px-5 min-h-[300px]">
            <div class="w-full flex justify-between items-end mb-2">
                <span class="text-[10px] font-black text-slate-500 tracking-widest uppercase">TIME REMAINING</span>
                <span id="timer-text" class="text-cyan-300 font-black text-lg">15s</span>
            </div>
            <div class="w-full h-2 bg-slate-900 rounded-full overflow-hidden mb-8">
                <div id="timer-bar" class="h-full bg-cyan-400 w-full origin-left transition-all"></div>
            </div>
            
            <div class="relative w-56 h-56 flex items-center justify-center mb-6">
                <div id="hero-box" class="w-[200px] h-[200px] rounded-full p-1.5 bg-gradient-to-b from-slate-700 to-slate-900 shadow-2xl relative overflow-hidden">
                    <img id="hero-img" src="" alt="Hero" class="w-full h-full object-cover rounded-full">
                    <div id="debug-msg" class="absolute inset-0 flex items-center justify-center bg-slate-900/95 text-red-500 text-xs font-bold text-center px-4 hidden"></div>
                </div>
            </div>
            <p id="feedback" class="text-center font-bold text-xl h-7"></p>
        </div>

        <div class="w-full shrink-0 flex flex-col gap-3 pb-6 px-5 items-center">
            <form id="form-guess" class="w-full flex flex-col gap-3">
                <input type="text" id="guess-input" placeholder="ENTER HERO" class="w-full h-14 bg-slate-900/80 border-2 border-slate-700 rounded-full px-6 text-2xl text-center font-black text-cyan-300 uppercase focus:outline-none focus:border-indigo-500 transition-all" autocomplete="off">
                <button type="submit" id="btn-submit" class="w-full h-14 bg-white text-slate-950 font-black text-xl rounded-full uppercase tracking-widest active:scale-95 transition-all">SUBMIT</button>
            </form>
            <button id="btn-show-leaderboard" class="h-10 w-full text-cyan-400 font-bold text-[10px] uppercase tracking-widest">Open Leaderboard</button>
        </div>

        <!-- CHAT -->
        <div id="chat-toasts" class="absolute bottom-48 left-4 right-4 flex flex-col gap-2 pointer-events-none z-30"></div>
        <button id="btn-chat-toggle" class="absolute bottom-6 right-6 w-12 h-12 bg-indigo-600 rounded-full flex items-center justify-center shadow-lg z-40"><svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" /></svg></button>
        
        <div id="chat-container" class="absolute inset-x-4 bottom-4 top-1/2 bg-slate-900 border border-slate-700 rounded-3xl z-50 flex flex-col hidden overflow-hidden shadow-2xl">
            <div class="flex items-center justify-between px-4 py-3 bg-slate-800/50 border-b border-slate-700">
                <span class="text-xs font-black text-cyan-400 uppercase">Global Chat</span>
                <button id="btn-chat-close" class="text-slate-400 hover:text-white">✕</button>
            </div>
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
            <form id="form-chat" class="p-3 bg-slate-950 flex gap-2">
                <input type="text" id="chat-input" placeholder="Say something..." class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-2 text-sm text-white focus:outline-none">
                <button type="submit" class="bg-indigo-600 text-white p-2 rounded-xl">Send</button>
            </form>
        </div>
    </div>

    <!-- LEADERBOARD SCREEN -->
    <div id="screen-leaderboard" class="fixed inset-0 bg-[#020617] z-50 hidden flex-col">
        <div class="flex-1 w-full max-w-md mx-auto flex flex-col px-5 py-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-black text-white italic">TOP STREAKS</h2>
                <button id="btn-close-leaderboard" class="text-slate-400 text-3xl font-bold hover:text-white transition-colors">✕</button>
            </div>
            <div class="flex-1 overflow-y-auto mb-4 no-scrollbar">
                <table class="w-full border-separate border-spacing-y-2">
                    <thead>
                        <tr class="text-slate-500 text-[10px] uppercase tracking-widest text-left">
                            <th class="p-2 w-16">Rank</th>
                            <th class="p-2">Player</th>
                            <th class="p-2 text-right">Streak</th>
                        </tr>
                    </thead>
                    <tbody id="lb-body"></tbody>
                </table>
            </div>
        </div>
    </div>

<!-- BROADCAST -->
    <!-- FIX: Removed pointer-events-none so the button can be clicked -->
    <div id="screen-broadcast" class="fixed inset-0 z-[100] hidden items-center justify-center bg-red-950/60 backdrop-blur-sm">
        <!-- Added relative positioning and max-width -->
        <div id="broadcast-box" class="relative bg-black border-4 border-rose-600 rounded-3xl p-8 flex flex-col items-center text-center shadow-2xl max-w-sm w-[90%]">
            <!-- CLOSE BUTTON -->
            <button id="btn-close-broadcast" class="absolute top-3 right-4 text-rose-600 hover:text-rose-400 text-2xl font-black transition-colors">✕</button>
            
            <h1 class="text-2xl font-black text-rose-500 uppercase mb-4 mt-2">ADMIN BROADCAST</h1>
            <p id="broadcast-text" class="text-3xl font-black text-white uppercase"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, addDoc, collection, query, orderBy, getDocs, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCPSU7YrNL0M9j0EFUBRHDoufpW9bQlUsI", authDomain: "guesshero-e1180.firebaseapp.com", projectId: "guesshero-e1180" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // State
        let currentUser = { id: "", ign: "", currentScore: 0, bestScore: 0, rank: "N/A" };
        let currentHero = null;
        let timerInterval = null;
        let isGameActive = false;
        let globalEventX2 = false;
        let globalEventFirstLetter = false;

        const vineBoomAudio = new Audio("https://www.myinstants.com/media/sounds/vine-boom.mp3");

        // Heroes
        const uniqueHeroNames = ["Lunox","Luo Yi","Zhuxin","Chip","Cici","Nolan","Arlott","Novaria","Joy","Fredrinn","Julian","Xavier","Melissa","Yin","Floryn","Edith","Valentina","Aamon","Aulus","Natan","Phoveus","Beatrix","Gloo","Paquito","Mathilda","Yve","Brody","Barats","Khaleed","Benedetta","Atlas","Carmilla","Cecilion","Silvanna","Wanwan","Masha","Baxia","Ling","X.borg","Terizla","Esmeralda","Guinevere","Granger","Khufra","Badang","Faramis","Kadita","Minotaur","Hanzo","Claude","Aldous","Selena","Kaja","Chang'e","Thamuz","Kimmy","Belerick","Leomord","Vale","Hanabi","Uranus","Martis","Valir","Gusion","Angela","Jawhead","Lesley","Pharsa","Helcurt","Zhask","Hylos","Diggie","Lancelot","Odette","Argus","Grock","Irithel","Harley","Gatotkaca","Roger","Vexana","Lapu-Lapu","Aurora","Hilda","Estes","Cyclops","Johnson","Moskov","Yi Sun shin","Ruby","Alpha","Sun","Chou","Kagura","Natalia","Gord","Freya","Hayabusa","Lolita","Layla","Zilong","Eudora","Rafaela","Clint","Bruno","Bane","Franco","Akai","Karina","Alucard","Miya","Saber","Balmond","Nana","Alice"];
        const heroes = [];
        uniqueHeroNames.forEach(h => {
            const slug = h.toLowerCase().replace(/[' .]/g, '-').replace(/\.+$/, '');
            heroes.push({ name: h, icon: `icons/${slug}-ss.webp` });
            heroes.push({ name: h, icon: `icons/${slug}-icon.webp` });
        });

        // DOM Elements
        const els = {
            screenLogin: document.getElementById('screen-login'),
            screenGame: document.getElementById('screen-game'),
            screenLB: document.getElementById('screen-leaderboard'),
            playerIgn: document.getElementById('player-ign'),
            playerStreak: document.getElementById('player-streak'),
            playerBest: document.getElementById('player-best'),
            timerText: document.getElementById('timer-text'),
            timerBar: document.getElementById('timer-bar'),
            heroImg: document.getElementById('hero-img'),
            guessInput: document.getElementById('guess-input'),
            feedback: document.getElementById('feedback'),
            chatMsgs: document.getElementById('chat-messages')
        };

        // Core Functions
        async function handleLogin(e) {
            e.preventDefault();
            const id = document.getElementById('login-id').value.trim();
            const zone = document.getElementById('login-zone').value.trim();
            if (!id || !zone) return;

            document.getElementById('btn-login').disabled = true;
            document.getElementById('login-msg').innerText = "Connecting...";

            try {
                const res = await fetch(`https://api.isan.eu.org/nickname/ml?id=${id}&zone=${zone}`);
                const data = await res.json();
                const ign = data.name || data.nickname || "Player";

                const userRef = doc(db, "players", id);
                const userDoc = await getDoc(userRef);

                if (!userDoc.exists()) {
                    await setDoc(userRef, { ign, score: 0, createdAt: serverTimestamp(), isBanned: false });
                    currentUser.bestScore = 0;
                } else {
                    if (userDoc.data().isBanned) throw new Error("Banned");
                    currentUser.bestScore = userDoc.data().score || 0;
                }

                currentUser.id = id; currentUser.ign = ign;
                localStorage.setItem('mlbb_id', id); localStorage.setItem('mlbb_zone', zone);
                
                els.screenLogin.classList.add('hidden'); els.screenGame.classList.remove('hidden');
                els.playerIgn.innerText = ign; els.playerBest.innerText = currentUser.bestScore;
                
                startServerListeners(); nextHero(); initChat();
            } catch (err) {
                document.getElementById('login-msg').innerText = "Login Error. Check ID/Zone.";
                document.getElementById('btn-login').disabled = false;
            }
        }

        function nextHero() {
            isGameActive = true;
            els.guessInput.value = ""; els.guessInput.disabled = false;
            els.feedback.innerText = "";
            
            currentHero = heroes[Math.floor(Math.random() * heroes.length)];
            els.heroImg.src = currentHero.icon;
            els.guessInput.placeholder = globalEventFirstLetter ? `Starts with: ${currentHero.name[0].toUpperCase()}` : "ENTER HERO";
            
            startTimer();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            let timeLeft = 15;
            els.timerBar.style.transition = 'none'; els.timerBar.style.transform = 'scaleX(1)';
            void els.timerBar.offsetWidth; 
            els.timerBar.style.transition = 'transform 15s linear'; els.timerBar.style.transform = 'scaleX(0)';

            timerInterval = setInterval(() => {
                timeLeft--; els.timerText.innerText = `${timeLeft}s`;
                if (timeLeft <= 0) { clearInterval(timerInterval); loseStreak("TIME UP!"); }
            }, 1000);
        }

        function checkGuess(e) {
            e.preventDefault();
            if (!isGameActive) return;
            const guess = els.guessInput.value.toLowerCase().replace(/[^a-z0-9]/g, '');
            const answer = currentHero.name.toLowerCase().replace(/[^a-z0-9]/g, '');

            if (guess === answer) {
                clearInterval(timerInterval); isGameActive = false;
                const pts = globalEventX2 ? 2 : 1;
                currentUser.currentScore += pts;
                els.playerStreak.innerText = currentUser.currentScore;
                
                if (currentUser.currentScore > currentUser.bestScore) {
                    currentUser.bestScore = currentUser.currentScore;
                    els.playerBest.innerText = currentUser.bestScore;
                    setDoc(doc(db, "players", currentUser.id), { score: currentUser.bestScore }, { merge: true });
                }
                els.feedback.innerText = "CORRECT! 🔥"; els.feedback.className = "text-center text-cyan-400 font-bold text-xl";
                setTimeout(nextHero, 1000);
            } else {
                loseStreak("WRONG!");
            }
        }

        function loseStreak(msg) {
            clearInterval(timerInterval); isGameActive = false;
            els.playerStreak.innerText = "0"; currentUser.currentScore = 0;
            els.feedback.innerText = `${msg} It was ${currentHero.name}`;
            els.feedback.className = "text-center text-rose-500 font-bold text-lg";
            document.getElementById('hero-box').classList.add('animate-error');
            setTimeout(() => { document.getElementById('hero-box').classList.remove('animate-error'); nextHero(); }, 2000);
        }

        function startServerListeners() {
            onSnapshot(doc(db, "server", "state"), (snap) => {
                if (!snap.exists()) return;
                const s = snap.data();
                globalEventX2 = s.doublePoints;
                globalEventFirstLetter = s.firstLetter;
                if (s.broadcastTrigger) {
                    const overlay = document.getElementById('screen-broadcast');
                    document.getElementById('broadcast-text').innerText = s.broadcastMsg || "ALERT";
                    overlay.classList.remove('hidden'); overlay.classList.add('flex');
                    vineBoomAudio.play().catch(()=>{});
                    setTimeout(() => overlay.classList.add('hidden'), 5000);
                }
            });
        }

        // --- CHAT SYSTEM ---
        function initChat() {
            const q = query(collection(db, "messages"), orderBy("timestamp", "desc"), limit(20));
            onSnapshot(q, (snap) => {
                els.chatMsgs.innerHTML = "";
                snap.docs.reverse().forEach(d => {
                    const m = d.data();
                    const div = document.createElement('div');
                    div.innerHTML = `<span class="text-[10px] text-indigo-400 font-bold">${m.ign}:</span> <span class="text-sm text-slate-200">${m.text}</span>`;
                    els.chatMsgs.appendChild(div);
                });
                els.chatMsgs.scrollTop = els.chatMsgs.scrollHeight;
            });
        }

        async function sendChat(e) {
            e.preventDefault();
            const text = document.getElementById('chat-input').value.trim();
            if (!text) return;
            document.getElementById('chat-input').value = "";
            await addDoc(collection(db, "messages"), { ign: currentUser.ign, text, timestamp: serverTimestamp() });
        }

        // Event Listeners
        document.getElementById('btn-close-broadcast').addEventListener('click', () => {
        document.getElementById('screen-broadcast').classList.add('hidden');
        });
        document.getElementById('form-login').addEventListener('submit', handleLogin);
        document.getElementById('form-guess').addEventListener('submit', checkGuess);
        document.getElementById('form-chat').addEventListener('submit', sendChat);
        document.getElementById('btn-chat-toggle').addEventListener('click', () => document.getElementById('chat-container').classList.toggle('hidden'));
        document.getElementById('btn-chat-close').addEventListener('click', () => document.getElementById('chat-container').classList.add('hidden'));

        document.getElementById('btn-show-leaderboard').addEventListener('click', async () => {
            const tbody = document.getElementById('lb-body');
            tbody.innerHTML = `<tr><td colspan="3" class="text-center p-4 text-slate-400 text-sm font-bold">Loading...</td></tr>`;
            els.screenLB.classList.remove('hidden'); els.screenLB.classList.add('flex');
            
            try {
                const q = query(collection(db, "players"), orderBy("score", "desc"), limit(50));
                const snap = await getDocs(q);
                tbody.innerHTML = "";
                
                if (snap.empty) {
                    tbody.innerHTML = `<tr><td colspan="3" class="text-center p-4 text-slate-400 text-sm font-bold">No scores yet!</td></tr>`;
                    return;
                }

                let r = 1;
                snap.forEach(d => {
                    const p = d.data();
                    let rankStyle = "text-slate-400";
                    if(r === 1) rankStyle = "text-yellow-400 text-lg";
                    if(r === 2) rankStyle = "text-slate-300 text-base";
                    if(r === 3) rankStyle = "text-amber-600 text-base";

                    tbody.innerHTML += `
                    <tr class="bg-slate-800/50 shadow-sm hover:bg-slate-800 transition-colors">
                        <td class="p-3 font-black rounded-l-xl ${rankStyle}">#${r++}</td>
                        <td class="p-3 font-bold text-white truncate max-w-[120px]">${p.ign}</td>
                        <td class="p-3 text-right font-black text-cyan-400 rounded-r-xl">${p.score}</td>
                    </tr>`;
                });
            } catch (err) {
                console.error("Leaderboard Error:", err);
                tbody.innerHTML = `<tr><td colspan="3" class="text-center p-4 text-rose-500 text-sm font-bold">Failed to load leaderboard.</td></tr>`;
            }
        });

        document.getElementById('btn-close-leaderboard').addEventListener('click', () => {
            els.screenLB.classList.add('hidden');
        });

        // Auto Login / Connect
        window.addEventListener('load', () => {
            const sid = localStorage.getItem('mlbb_id');
            const szone = localStorage.getItem('mlbb_zone');
            if (sid && szone) {
                document.getElementById('login-id').value = sid;
                document.getElementById('login-zone').value = szone;
                // Automatically click connect button to save user time
                document.getElementById('btn-login').click();
            }
        });

    </script>
</body>
</html>
