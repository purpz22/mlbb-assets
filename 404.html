<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9; /* Change to match your site */
            color: #333;
            text-align: center;
            padding: 10%;
        }
        h1 {
            font-size: 80px;
            margin-bottom: 10px;
            color: #6a0dad; /* A purple color to match your domain name! */
        }
        p {
            font-size: 20px;
            margin-bottom: 30px;
        }
        a {
            padding: 10px 20px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        a:hover {
            background-color: #6a0dad;
        }
    </style>
</head>
<body>

    <h1>404</h1>
    <p>Oops! The page you are looking for has disappeared into the void.</p>
    <a href="/">Return to Homepage</a>

</body>
</html>
