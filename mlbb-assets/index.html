            30% { transform: translate(-15px, 20px) rotate(-2deg); }
            100% { transform: translate(0, 0) scale(1); opacity: 1; }
        }
        .animate-boom {
            animation: vine-boom-anim 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;

        let currentUser = { id: "", ign: "", currentScore: 0, bestScore: 0, rank: "N/A" };
        let currentHero = null;
        let timerInterval = null;
        let isGameActive = false;
        let isChatOpen = false;

        const els = {
            screenLogin: document.getElementById('screen-login'),
            screenGame: document.getElementById('screen-game'),
            screenLeaderboard: document.getElementById('screen-leaderboard'),
            loginMsg: document.getElementById('login-msg'),

            playerStreak: document.getElementById('player-streak'),

        // --- CORE LOGIC ---
        function listenToServerCommands() {
            onSnapshot(doc(db, "server", "state"), (docSnap) => {
                if(docSnap.exists()) {
                    const state = docSnap.data();
                    
                    if(state.refreshTrigger) {
                        const triggerTime = state.refreshTrigger.toMillis ? state.refreshTrigger.toMillis().toString() : "";
                        if(triggerTime && localStorage.getItem('last_refresh') !== triggerTime) {
                            localStorage.setItem('last_refresh', triggerTime);
                            window.location.reload();
                        }
                    }

                    globalEventX2 = state.doublePoints === true;
                    globalEventFirstLetter = state.firstLetter === true;
                    if(isGameActive && currentHero) {
                        els.guessInput.placeholder = globalEventFirstLetter ? `Starts with: ${currentHero.name.charAt(0).toUpperCase()}` : "ENTER HERO";
                    }

                    if(state.broadcastTrigger && state.broadcastTrigger.toMillis) {
                        const triggerTime = state.broadcastTrigger.toMillis().toString();
                        if(localStorage.getItem('last_broadcast') !== triggerTime) {
                            localStorage.setItem('last_broadcast', triggerTime);
                            vineBoomAudio.currentTime = 0; vineBoomAudio.volume = 1.0; vineBoomAudio.play().catch(e => {});
                            const overlay = document.getElementById('screen-broadcast');
                            const box = document.getElementById('broadcast-box');
                            const text = document.getElementById('broadcast-text');
                            if(overlay && box && text) {
                                text.innerText = state.broadcastMsg || "ATTENTION!";
                                overlay.classList.remove('hidden'); overlay.classList.add('flex');
                                box.classList.remove('animate-boom'); void box.offsetWidth; box.classList.add('animate-boom');
                                setTimeout(() => { overlay.classList.add('hidden'); overlay.classList.remove('flex'); }, 6000);
                            }
                        }
                    }
                }
            });

            // Player Info Listener
            if(currentUser.id) {
                onSnapshot(doc(db, "players", currentUser.id), (docSnap) => {
                    if(docSnap.exists()) {
                        const data = docSnap.data();
                        if(data.isBanned) { alert("BANNED."); localStorage.removeItem('mlbb_id'); window.location.reload(); }
                        if(data.score !== currentUser.bestScore) { 
                            currentUser.bestScore = data.score; 
                            els.playerBest.innerText = currentUser.bestScore; 
                        }
                    } else { localStorage.removeItem('mlbb_id'); window.location.reload(); }
                });
            }
        }

        // --- INSTANT AUTO-LOGIN ---
        window.addEventListener('DOMContentLoaded', () => {
            const lastId = localStorage.getItem('last_mlbb_id');
            const lastZone = localStorage.getItem('last_mlbb_zone');
            if (lastId) document.getElementById('login-id').value = lastId;
            if (lastZone) document.getElementById('login-zone').value = lastZone;

            const savedId = localStorage.getItem('mlbb_id');
            const savedZone = localStorage.getItem('mlbb_zone');
            if (savedId && savedZone) performAutoLogin(savedId, savedZone);
        });

        async function performAutoLogin(id, zone) {
            const btn = document.getElementById('btn-login');
            btn.disabled = true; btn.innerText = "RESTORING...";
            els.loginMsg.innerText = "Welcome back!";

            try {
                const userDoc = await getDoc(doc(db, "players", id));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    if (userData.isBanned) { localStorage.clear(); location.reload(); return; }
                    
                    currentUser.id = id; 
                    currentUser.ign = userData.ign; 
                    currentUser.bestScore = userData.score || 0;
                    currentUser.currentScore = 0;
                    
                    els.screenLogin.classList.add('hidden'); els.screenLogin.classList.remove('flex');
                    els.screenGame.classList.remove('hidden'); els.screenGame.classList.add('flex');
                    
                    els.playerIgn.innerText = currentUser.ign; 
                    els.playerBest.innerText = currentUser.bestScore;
                    els.playerStreak.innerText = currentUser.currentScore;
                    
                    nextHero(); initChatSystem(); listenToServerCommands();
                    try {
                        const q = query(collection(db, "players"), orderBy("score", "desc"), limit(100));
                        const snapshot = await getDocs(q);
                        let rank = 1, found = false;
                        snapshot.forEach(doc => { if(doc.id === id) found = true; if(!found) rank++; });
                        currentUser.rank = found ? `#${rank}` : "100+";
                    } catch(e) { currentUser.rank = "?"; }
                } else throw new Error("Session expired.");
            } catch (e) {
                localStorage.removeItem('mlbb_id'); localStorage.removeItem('mlbb_zone');
                btn.disabled = false; btn.innerText = "CONNECT"; els.loginMsg.innerText = "";
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const id = document.getElementById('login-id').value.trim();
            const zone = document.getElementById('login-zone').value.trim();
            if (!/^\d+$/.test(id) || !/^\d+$/.test(zone)) return;

            els.loginMsg.innerText = "Connecting..."; document.getElementById('btn-login').disabled = true;

            try {
                const res = await fetch(`https://api.isan.eu.org/nickname/ml?id=${id}&zone=${zone}`);
                const data = await res.json();
                if (!data.success && !data.name && !data.nickname) throw new Error("Invalid ID");
                
                const fetchedIgn = data.name || data.nickname;
                const userRef = doc(db, "players", id);
                const userDoc = await getDoc(userRef);

                if (userDoc.exists()) {
                    if (userDoc.data().isBanned) { localStorage.clear(); location.reload(); return; }
                    currentUser.bestScore = userDoc.data().score || 0;
                } else {
                    currentUser.bestScore = 0;
                    await setDoc(userRef, { ign: fetchedIgn, score: 0, createdAt: serverTimestamp(), isBanned: false, zone: zone });
                }

                currentUser.id = id; 
                currentUser.ign = fetchedIgn;
                currentUser.currentScore = 0;
                
                localStorage.setItem('mlbb_id', id); localStorage.setItem('mlbb_zone', zone);
                localStorage.setItem('last_mlbb_id', id); localStorage.setItem('last_mlbb_zone', zone);

                els.screenLogin.classList.add('hidden'); els.screenLogin.classList.remove('flex');
                els.screenGame.classList.remove('hidden'); els.screenGame.classList.add('flex');
                
                els.playerIgn.innerText = currentUser.ign; 
                els.playerBest.innerText = currentUser.bestScore;
                els.playerStreak.innerText = currentUser.currentScore;
                
                nextHero(); initChatSystem(); listenToServerCommands();
                try {
                    const q = query(collection(db, "players"), orderBy("score", "desc"), limit(100));
                    const snapshot = await getDocs(q);
                    let rank=1, found=false;
                    snapshot.forEach(doc => { if(doc.id===id) found=true; if(!found) rank++; });
                    currentUser.rank = found ? `#${rank}` : "100+";
                } catch(e) { currentUser.rank="?"; }
            } catch(e) { 
                els.loginMsg.innerText = "Login Failed"; 
                localStorage.removeItem('mlbb_id'); localStorage.removeItem('mlbb_zone');
            } finally { document.getElementById('btn-login').disabled = false; }
        }

        // --- GAMEPLAY LOGIC ---
        function nextHero() {
            try {
                els.guessInput.value = ""; els.guessInput.disabled = false; els.btnSubmit.disabled = false;
                els.feedback.innerText = ""; els.debugMsg.classList.add('hidden'); els.heroImg.style.display = 'block';
                els.timerBar.style.backgroundColor = "#22d3ee"; 

                currentHero = heroes[Math.floor(Math.random() * heroes.length)];
                els.heroImg.src = currentHero.icon_path;
                els.guessInput.placeholder = globalEventFirstLetter ? `Starts with: ${currentHero.name.charAt(0).toUpperCase()}` : "ENTER HERO";
                
                setTimeout(() => { if (!els.guessInput.disabled) els.guessInput.focus(); }, 100);
                startTimer();
            } catch (err) { setTimeout(nextHero, 1000); }
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            isGameActive = true; let timeLeft = 15; els.timerText.innerText = `${timeLeft}s`;
            
            els.timerBar.style.transition = 'none'; els.timerBar.style.transform = 'scaleX(1)'; void els.timerBar.offsetWidth; 
            els.timerBar.style.transition = `transform 15s linear, background-color 0.3s`; els.timerBar.style.transform = 'scaleX(0)';

            timerInterval = setInterval(() => {
                if (!isGameActive) { clearInterval(timerInterval); return; }
                timeLeft--; els.timerText.innerText = `${timeLeft}s`;
                if (timeLeft <= 5) els.timerBar.style.backgroundColor = "#f43f5e";
                if (timeLeft <= 0) { clearInterval(timerInterval); timeIsUp(); }
            }, 1000);
        }

        function timeIsUp() {
            isGameActive = false;
            
            // Streak Lost Logic
            currentUser.currentScore = 0;
            els.playerStreak.innerText = currentUser.currentScore;
            
            els.playerStreak.classList.add('text-rose-500', 'animate-error');
            setTimeout(() => els.playerStreak.classList.remove('text-rose-500', 'animate-error'), 500);

            els.feedback.innerText = `TIMEOUT! STREAK LOST! It was ${currentHero.name}`;
            els.feedback.className = "text-center font-black text-lg h-7 tracking-wide flex items-center justify-center text-rose-500 uppercase drop-shadow-[0_0_8px_rgba(225,29,72,0.8)]";
            
            els.heroBox.classList.add('animate-error'); 
            setTimeout(() => els.heroBox.classList.remove('animate-error'), 400);
            
            lockGame(2500);
        }

        async function checkGuess(e) {
            e.preventDefault(); if (!isGameActive) return;
            const guess = els.guessInput.value.toLowerCase().replace(/[^a-z0-9]/g, '');
            const answer = currentHero.name.toLowerCase().replace(/[^a-z0-9]/g, '');

            if (guess === answer) {
                clearInterval(timerInterval); isGameActive = false; els.timerBar.style.transition = 'none'; 
                
                let pts = globalEventX2 ? 2 : 1;
                currentUser.currentScore += pts;
                els.playerStreak.innerText = currentUser.currentScore;

                // Pop Animation on streak
                els.playerStreak.style.transform = 'scale(1.5)';
                setTimeout(() => els.playerStreak.style.transform = 'scale(1)', 200);

                // Handle Best Score
                if (currentUser.currentScore > currentUser.bestScore) {
                    currentUser.bestScore = currentUser.currentScore;
                    els.playerBest.innerText = currentUser.bestScore;
                    
                    els.feedback.innerText = globalEventX2 ? "NEW BEST! (+2) 🔥" : "NEW BEST! 🔥";
                    els.feedback.className = "text-center font-black text-xl h-7 text-yellow-400 tracking-[0.2em] drop-shadow-[0_0_8px_rgba(250,204,21,0.8)] flex items-center justify-center";
                    saveScore(); 
                } else {
                    els.feedback.innerText = globalEventX2 ? "CORRECT! (+2)" : "CORRECT!";
                    els.feedback.className = "text-center font-black text-xl h-7 text-cyan-400 tracking-[0.2em] drop-shadow-[0_0_8px_rgba(34,211,238,0.5)] flex items-center justify-center";
                }

                fireCustomConfetti(); lockGame(1500); 

            } else {
                clearInterval(timerInterval); isGameActive = false; els.timerBar.style.transition = 'none'; 
                
                // Streak Lost Logic
                currentUser.currentScore = 0;
                els.playerStreak.innerText = currentUser.currentScore;
                
                els.playerStreak.classList.add('text-rose-500', 'animate-error');
                setTimeout(() => els.playerStreak.classList.remove('text-rose-500', 'animate-error'), 500);

                els.guessInput.value = ""; 
                els.feedback.innerText = `STREAK LOST! It was ${currentHero.name}`; 
                els.feedback.className = "text-center font-black text-lg h-7 tracking-wide flex items-center justify-center text-rose-500 uppercase drop-shadow-[0_0_8px_rgba(225,29,72,0.8)]";
                
                els.heroBox.classList.add('animate-error'); 
                setTimeout(() => els.heroBox.classList.remove('animate-error'), 400);
                
                lockGame(2500);
            }
        }

        function lockGame(delay) {
            els.guessInput.disabled = true; els.btnSubmit.disabled = true;
            setTimeout(nextHero, delay);
        }

        async function saveScore() {
            if (!navigator.onLine) return; 
            try { 
                await setDoc(doc(db, "players", currentUser.id), { 
                    ign: currentUser.ign, 
                    score: currentUser.bestScore, 
                    updatedAt: new Date() 
                }, { merge: true }); 
            } catch (err) {}
        }

        // --- CHAT SYSTEM ---
        let isInitialLoad = true;
        function initChatSystem() {
            const q = query(collection(db, "messages"), orderBy("timestamp", "desc"), limit(30));
            onSnapshot(q, (snapshot) => {
                const newDocs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).reverse();
                els.chatMessages.innerHTML = '<div class="text-center text-[10px] text-slate-500 uppercase tracking-widest py-4">Welcome to Global Chat</div>';
                newDocs.forEach(data => addMessageToUI(data));

                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added" && !isInitialLoad && !isChatOpen) showToast(change.doc.data());
                });
                
                if (isInitialLoad) { setTimeout(() => els.chatMessages.scrollTop = els.chatMessages.scrollHeight, 100); isInitialLoad = false; }
            });
        }

        async function sendChatMessage(e) {
            e.preventDefault(); const text = els.chatInput.value.trim(); if (!text) return;
            els.chatInput.value = ""; els.chatInput.focus();
            try { await addDoc(collection(db, "messages"), { ign: currentUser.ign, rank: currentUser.rank || "N/A", text: text, timestamp: serverTimestamp() });
            } catch (err) { console.error("Chat Error:", err); }
        }

        function addMessageToUI(data) {
            const div = document.createElement('div'); div.className = "flex flex-col animate-[slideUp_0.3s_ease-out]";
            div.innerHTML = `<div class="flex items-baseline gap-2"><span class="text-[10px] font-black ${data.rank === "#1" ? "text-cyan-400" : "text-indigo-400"} tracking-wider">${data.rank}</span><span class="text-xs font-bold text-slate-400 truncate max-w-[120px]">${data.ign}</span></div><div class="bg-slate-800/60 rounded-r-xl rounded-bl-xl p-2 text-sm text-slate-200 mt-0.5 break-words border border-slate-700/50">${data.text.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>`;
            els.chatMessages.appendChild(div); els.chatMessages.scrollTop = els.chatMessages.scrollHeight; 
        }

        function showToast(data) {
            const toast = document.createElement('div'); toast.className = "bg-slate-900/90 backdrop-blur-md border border-slate-700 p-3 rounded-xl shadow-lg flex flex-col gap-1 toast-enter pointer-events-auto max-w-[250px]";
            toast.innerHTML = `<div class="flex items-center gap-2"><span class="text-[9px] font-black text-indigo-400 bg-indigo-900/30 px-1 rounded">${data.rank}</span><span class="text-[10px] font-bold text-slate-400 truncate">${data.ign}</span></div><span class="text-xs text-white leading-tight break-words">${data.text.replace(/</g, "&lt;")}</span>`;
            els.chatToasts.appendChild(toast);
            setTimeout(() => { toast.classList.remove('toast-enter'); toast.classList.add('toast-exit'); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        function fireCustomConfetti() {
            const colors = ['#22d3ee', '#818cf8', '#f8fafc', '#facc15'];
            for (let i = 0; i < 35; i++) {
                const conf = document.createElement('div'); conf.style.cssText = `position:fixed;width:8px;height:8px;background:${colors[Math.floor(Math.random()*colors.length)]};left:50%;top:50%;z-index:99;pointer-events:none;border-radius:50%`;
                document.body.appendChild(conf);
                const angle = Math.random() * Math.PI * 2, velocity = Math.random() * 15 + 5;
                const vx = Math.cos(angle) * velocity; let vy = Math.sin(angle) * velocity - 8;
                let x = window.innerWidth/2, y = window.innerHeight/2, op = 1;
                const animate = () => { x+=vx; vy+=0.5; y+=vy; op-=0.02; conf.style.transform=`translate(${x-window.innerWidth/2}px,${y-window.innerHeight/2}px)`; conf.style.opacity=op; if(op>0)requestAnimationFrame(animate); else conf.remove(); };
                requestAnimationFrame(animate);
            }
        }

            if(e) e.preventDefault(); history.pushState({ page: 'leaderboard' }, '');

                const q = query(collection(db, "players"), orderBy("score", "desc"), limit(100));
                const snapshot = await getDocs(q); tbody.innerHTML = ""; let rank = 1;
                snapshot.forEach(doc => {
                    const p = doc.data(); let rankColor = "text-slate-500", bgClass = "bg-slate-900/60 border-slate-800", prizeBadge = "";

                    rank++;
                });

        }

            els.screenLeaderboard.classList.add('hidden'); els.screenLeaderboard.classList.remove('flex');
            els.screenGame.classList.remove('hidden'); els.screenGame.classList.add('flex');
        }

        document.getElementById('form-login').addEventListener('submit', handleLogin);
        document.getElementById('form-guess').addEventListener('submit', checkGuess);

        };
        document.body.addEventListener('click', unlockMusic, { passive: true });
        document.body.addEventListener('touchstart', unlockMusic, { passive: true });

        // --- LOCAL MUSIC ENGINE LOGIC ---
        const localLoadBtn = document.getElementById('btn-local-load');
        const localTracks = document.getElementById('local-tracks');
        const localAudio = document.getElementById('local-audio');
        const localStatus = document.getElementById('local-status');

        localAudio.addEventListener('play', () => { currentMusic = localAudio; isMusicPlaying = true; });
        localAudio.addEventListener('pause', () => { isMusicPlaying = false; });
        localAudio.addEventListener('ended', () => { isMusicPlaying = false; });

        const playlist = [
            { title: 'Chill Beat', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3' },
            { title: 'Jazz Lounge', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3' },
            { title: 'Ambient Wave', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3' }
        ];

        function renderLocalPlaylist() {
            localTracks.innerHTML = '';
            playlist.forEach((track, index) => {
                const button = document.createElement('button');
                button.className = 'w-full text-left text-xs px-2 py-1 rounded hover:bg-slate-800/80';
                button.innerText = `${index + 1}. ${track.title}`;
                button.addEventListener('click', async () => {
                    try {
                        localAudio.src = track.url;
                        currentMusic = localAudio;
                        await localAudio.play();
                        isMusicPlaying = true;
                        localStatus.innerText = `Playing: ${track.title}`;
                    } catch (e) {
                        localStatus.innerText = 'Playback not allowed until user interaction.';
                        console.error(e);
                    }
                });
                localTracks.appendChild(button);
            });
            localStatus.innerText = 'Choose a track to play (from public sample URLs).';
        }

        if (localLoadBtn) {
            localLoadBtn.addEventListener('click', (e) => {
                e.preventDefault();
                renderLocalPlaylist();
            });
        }

        // ------ SPOTIFY PLAYBACK SUPPORT (PKCE Authorization Code Flow) ------
        const spotifyClientId = '2670466b08474c9898b7627a096248bc'; // Replace with your Spotify client ID
        const spotifyRedirectUri = window.location.origin + window.location.pathname;
        const spotifyPlaylistUri = 'spotify:playlist:37i9dQZF1DXcBWIGoYBM5M'; // example playlist URI

        const spotifyTokenEndpoint = (window.location.hostname.includes('github.io') || window.location.hostname.includes('vercel.app'))
            ? 'https://your-backend-host.example.com/spotify/token'  // Replace with deployed backend
            : 'http://127.0.0.1:5000/spotify/token';

        console.log('Spotify token endpoint:', spotifyTokenEndpoint);

        const spotifyLoginBtn = document.getElementById('btn-spotify-login');
        const spotifyPlayBtn = document.getElementById('btn-spotify-play');

        const spotifyKeys = {
            token: 'spotify_token',
            refresh: 'spotify_refresh_token',
            expires: 'spotify_token_expires',
            state: 'spotify_auth_state',
            codeVerifier: 'spotify_code_verifier'
        };

        const toBase64Url = (arrayBuffer) => {
            const bytes = new Uint8Array(arrayBuffer);
            let str = '';
            bytes.forEach((b) => { str += String.fromCharCode(b); });
            return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        };

        const sha256 = async (text) => {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            return toBase64Url(hashBuffer);
        };

        const randomString = (length) => {
            const charset = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
            let result = '';
            const values = crypto.getRandomValues(new Uint8Array(length));
            values.forEach((v) => result += charset[v % charset.length]);
            return result;
        };

        const saveSpotifyTokens = (tokenData) => {
            localStorage.setItem(spotifyKeys.token, tokenData.access_token);
            localStorage.setItem(spotifyKeys.refresh, tokenData.refresh_token || '');
            localStorage.setItem(spotifyKeys.expires, String(Date.now() + (tokenData.expires_in || 3600) * 1000));
        };

        const getSpotifyToken = () => {
            const token = localStorage.getItem(spotifyKeys.token);
            const expires = Number(localStorage.getItem(spotifyKeys.expires) || '0');
            if (!token || Date.now() >= expires) return null;
            return token;
        };

        const getSpotifyRefreshToken = () => localStorage.getItem(spotifyKeys.refresh);

        const clearSpotifyTokens = () => {
            Object.values(spotifyKeys).forEach((k) => localStorage.removeItem(k));
        };

        const buildSpotifyAuthUrl = async () => {
            const state = randomString(16);
            const codeVerifier = randomString(128);
            const codeChallenge = await sha256(codeVerifier);

            localStorage.setItem(spotifyKeys.state, state);
            localStorage.setItem(spotifyKeys.codeVerifier, codeVerifier);

            const scope = [
                'streaming',
                'user-read-private',
                'user-read-email',
                'user-read-playback-state',
                'user-modify-playback-state',
                'user-read-currently-playing'
            ].join(' ');

            const authorizeUrl = new URL('https://accounts.spotify.com/authorize');
            authorizeUrl.searchParams.set('client_id', spotifyClientId);
            authorizeUrl.searchParams.set('response_type', 'code');
            authorizeUrl.searchParams.set('redirect_uri', spotifyRedirectUri);
            authorizeUrl.searchParams.set('scope', scope);
            authorizeUrl.searchParams.set('code_challenge_method', 'S256');
            authorizeUrl.searchParams.set('code_challenge', codeChallenge);
            authorizeUrl.searchParams.set('state', state);
            authorizeUrl.searchParams.set('show_dialog', 'true');

            return authorizeUrl.toString();
        };

        const handleSpotifyCallback = async () => {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const state = params.get('state');
            const error = params.get('error');
            const savedState = localStorage.getItem(spotifyKeys.state);

            if (error) {
                localStatus.innerText = `Spotify auth error: ${error}`;
                return;
            }

            if (!code || !state || state !== savedState) return;

            const codeVerifier = localStorage.getItem(spotifyKeys.codeVerifier);
            if (!codeVerifier) {
                localStatus.innerText = 'Missing code verifier. Reconnect Spotify.';
                return;
            }

            try {
                const tokenUrl = spotifyTokenEndpoint;
                console.log('Spotify token exchange request', tokenUrl);

                const tokenResponse = await fetch(tokenUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        grant_type: 'authorization_code',
                        code,
                        redirect_uri: spotifyRedirectUri,
                        code_verifier: codeVerifier
                    })
                });

                const text = await tokenResponse.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (parseErr) {
                    console.error('Spotify token exchange: non-JSON response', text);
                    throw new Error('Spotify token exchange failed: invalid JSON response');
                }

                if (!tokenResponse.ok) {
                    throw new Error(data.error_description || data.error || 'Token exchange failed');
                }

                saveSpotifyTokens(data);
                localStatus.innerText = 'Spotify connected successfully.';
            } catch (err) {
                console.error('Spotify token exchange error', err);
                localStatus.innerText = `Spotify token exchange failed: ${err.message}`;
                clearSpotifyTokens();
            } finally {
                localStorage.removeItem(spotifyKeys.state);
                localStorage.removeItem(spotifyKeys.codeVerifier);
                window.history.replaceState({}, document.title, spotifyRedirectUri);
            }
        };

        const refreshSpotifyToken = async () => {
            const refreshToken = getSpotifyRefreshToken();
            if (!refreshToken) {
                clearSpotifyTokens();
                return null;
            }

            try {
                const tokenUrl = spotifyTokenEndpoint;
                console.log('Spotify refresh token request', tokenUrl);

                const response = await fetch(tokenUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        grant_type: 'refresh_token',
                        refresh_token: refreshToken
                    })
                });
                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (parseErr) {
                    console.error('Spotify refresh token: non-JSON response', text);
                    throw new Error('Spotify token refresh failed: invalid JSON response');
                }
                if (!response.ok) {
                    throw new Error(data.error_description || data.error || 'Refresh failed');
                }
                saveSpotifyTokens({
                    access_token: data.access_token,
                    refresh_token: data.refresh_token || refreshToken,
                    expires_in: data.expires_in || 3600
                });
                return data.access_token;
            } catch (err) {
                console.error('Spotify refresh error', err);
                clearSpotifyTokens();
                return null;
            }
        };

        const startSpotifyPlaylist = async () => {
            let token = getSpotifyToken();
            if (!token) {
                token = await refreshSpotifyToken();
            }
            if (!token) {
                localStatus.innerText = 'Spotify not linked. Click Link Spotify first.';
                return;
            }

            try {
                const devicesResp = await fetch('https://api.spotify.com/v1/me/player/devices', {
                    headers: { Authorization: `Bearer ${token}` }
                });

                const devicesData = await devicesResp.json();
                const devices = devicesData.devices || [];

                if (!devices.length) {
                    localStatus.innerText = 'No active Spotify device. Start playback on Spotify first.';
                    return;
                }

                const activeDevice = devices.find((d) => d.is_active) || devices[0];
                if (!activeDevice) {
                    localStatus.innerText = 'No suitable Spotify device found.';
                    return;
                }

                const playResp = await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${activeDevice.id}`, {
                    method: 'PUT',
                    headers: {
                        Authorization: `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ context_uri: spotifyPlaylistUri })
                });

                if (playResp.ok) {
                    localStatus.innerText = `Spotify playlist started on ${activeDevice.name}`;
                } else {
                    const err = await playResp.json();
                    localStatus.innerText = `Spotify play error: ${err.error?.message || playResp.statusText}`;
                }
            } catch (err) {
                console.error('Spotify start error', err);
                localStatus.innerText = 'Spotify playback error. Check console.';
            }
        };

        const promptSpotifyLogin = async () => {
            if (!spotifyClientId || spotifyClientId === 'YOUR_SPOTIFY_CLIENT_ID') {
                localStatus.innerText = 'Set a valid Spotify Client ID in script first.';
                return;
            }
            const authUrl = await buildSpotifyAuthUrl();
            window.location.href = authUrl;
        };

        if (spotifyLoginBtn) {
            spotifyLoginBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                await promptSpotifyLogin();
            });
        }

        if (spotifyPlayBtn) {
            spotifyPlayBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                await startSpotifyPlaylist();
            });
        }

        handleSpotifyCallback().catch((err) => {
            console.error('Spotify callback handler error', err);
        });

        
    </script>
</body>
</html>
